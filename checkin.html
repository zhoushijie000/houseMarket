<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>活动签到</title>
  <style>
    :root {
      --brand-primary: #fd5d00;
      --brand-secondary: #ff8f2e;
      --brand-deep: #c74100;
      --text-primary: #303133;
      --text-secondary: #606266;
      --text-tertiary: #909399;
      --line-soft: #e4e7ed;
      --surface: #ffffff;
      --page-bg: #f4f6f8;
      --success: #34a853;
      --danger: #ff4d4f;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(255, 210, 181, 0.9), transparent 34%),
        linear-gradient(180deg, #fff8f2 0%, #f4f6f8 100%);
      color: var(--text-primary);
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      padding: 24px 12px;
    }

    button,
    input {
      font: inherit;
    }

    .phone-shell {
      position: relative;
      width: min(100%, 375px);
      min-height: 812px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 18px 44px rgba(48, 49, 51, 0.14);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 58px;
      padding: calc(12px + env(safe-area-inset-top, 0px)) 16px 12px;
      background: rgba(255, 255, 255, 0.96);
      border-bottom: 1px solid rgba(228, 231, 237, 0.9);
      backdrop-filter: blur(14px);
    }

    .topbar__title {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.4;
    }

    .page-content {
      padding: 16px 16px calc(110px + env(safe-area-inset-bottom, 0px));
      display: grid;
      gap: 16px;
    }

    .map-card,
    .form-card {
      background: var(--surface);
      box-shadow: 0 14px 30px rgba(17, 24, 39, 0.08);
    }

    .map-card {
      overflow: hidden;
    }

    .map-stage {
      position: relative;
      min-height: 240px;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.48) 0 8%, transparent 8% 92%, rgba(255,255,255,0.48) 92% 100%),
        linear-gradient(0deg, rgba(255,255,255,0.48) 0 12%, transparent 12% 88%, rgba(255,255,255,0.48) 88% 100%),
        linear-gradient(135deg, rgba(255, 225, 203, 0.92), rgba(255, 244, 233, 0.96));
    }

    .map-stage::before,
    .map-stage::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      background: rgba(116, 190, 105, 0.18);
    }

    .map-stage::before {
      width: 124px;
      height: 124px;
      left: 24px;
      top: 18px;
    }

    .map-stage::after {
      width: 92px;
      height: 92px;
      right: 28px;
      bottom: 28px;
    }

    .map-road {
      position: absolute;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: inset 0 0 0 1px rgba(253, 93, 0, 0.08);
    }

    .map-road--horizontal {
      left: -10%;
      right: -10%;
      top: 52%;
      height: 18px;
      transform: rotate(-8deg);
    }

    .map-road--vertical {
      top: -8%;
      bottom: -8%;
      left: 58%;
      width: 18px;
      transform: rotate(12deg);
    }

    .map-radius {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 190px;
      height: 190px;
      border-radius: 50%;
      border: 2px dashed rgba(253, 93, 0, 0.36);
      background: rgba(253, 93, 0, 0.08);
      transform: translate(-50%, -50%);
    }

    .map-pin,
    .map-user {
      position: absolute;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      box-shadow: 0 8px 18px rgba(17, 24, 39, 0.16);
    }

    .map-pin {
      left: 50%;
      top: 50%;
      width: 26px;
      height: 26px;
      background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      transform: translate(-50%, -50%);
    }

    .map-user {
      background: #2f80ed;
      border: 3px solid #fff;
      transform: translate(-50%, -50%);
    }

    .map-legend {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 10px 24px rgba(17, 24, 39, 0.08);
    }

    .map-legend__title {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.4;
    }

    .map-legend__meta {
      margin: 4px 0 0;
      color: var(--text-secondary);
      font-size: 12px;
      line-height: 1.5;
    }

    .ghost-button {
      min-width: 88px;
      min-height: 36px;
      padding: 0 14px;
      border: 1px solid rgba(253, 93, 0, 0.16);
      background: rgba(255, 245, 235, 0.96);
      color: var(--brand-deep);
      cursor: pointer;
    }

    .form-card {
      padding: 18px 16px;
      display: grid;
      gap: 14px;
    }

    .eyebrow {
      color: var(--brand-deep);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.4;
      letter-spacing: 0.06em;
    }

    .section-title {
      margin: 0;
      font-size: 22px;
      font-weight: 800;
      line-height: 1.35;
    }

    .section-desc {
      margin: 0;
      color: var(--text-secondary);
      font-size: 13px;
      line-height: 1.7;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field label {
      color: var(--text-primary);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.4;
    }

    .field input {
      width: 100%;
      min-height: 48px;
      padding: 0 14px;
      border: 1px solid rgba(228, 231, 237, 0.96);
      background: #fff;
      color: var(--text-primary);
      outline: none;
    }

    .field input:focus {
      border-color: rgba(253, 93, 0, 0.38);
      box-shadow: 0 0 0 4px rgba(253, 93, 0, 0.08);
    }

    .status-box {
      padding: 12px 14px;
      background: #f8fafc;
      border-left: 3px solid rgba(253, 93, 0, 0.36);
    }

    .status-box__title {
      margin: 0;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.5;
    }

    .status-box__desc {
      margin: 6px 0 0;
      color: var(--text-secondary);
      font-size: 12px;
      line-height: 1.6;
    }

    .status-box[data-state="success"] {
      border-left-color: rgba(52, 168, 83, 0.72);
      background: rgba(52, 168, 83, 0.08);
    }

    .status-box[data-state="error"] {
      border-left-color: rgba(255, 77, 79, 0.72);
      background: rgba(255, 77, 79, 0.08);
    }

    .submit-bar {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 12px 16px calc(18px + env(safe-area-inset-bottom, 0px));
      background: linear-gradient(180deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.94) 26%, #fff 100%);
    }

    .primary-button {
      width: 100%;
      min-height: 48px;
      border: none;
      background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      box-shadow: 0 14px 26px rgba(253, 93, 0, 0.24);
      cursor: pointer;
    }

    .primary-button:disabled {
      opacity: 0.56;
      cursor: not-allowed;
      box-shadow: none;
    }
  </style>
</head>
<body>
  <div class="phone-shell">
    <header class="topbar">
      <div class="topbar__title">活动签到</div>
    </header>

    <main class="page-content">
      <section class="map-card">
        <div class="map-stage" id="mapStage">
          <div class="map-road map-road--horizontal"></div>
          <div class="map-road map-road--vertical"></div>
          <div class="map-radius"></div>
          <div class="map-pin" title="签到点">签</div>
          <div class="map-user" id="mapUserPoint" title="当前位置"></div>
          <div class="map-legend">
            <div>
              <p class="map-legend__title">上海活动签到点</p>
              <p class="map-legend__meta" id="locationMeta">正在获取定位...</p>
            </div>
            <button class="ghost-button" type="button" id="relocateButton">重新定位</button>
          </div>
        </div>
      </section>

      <section class="form-card">
              <form id="checkinForm">
          <div class="field">
            <label for="nameInput">姓名 / 称呼</label>
            <input id="nameInput" type="text" placeholder="例如：张先生 / 李女士 / 张三" />
          </div>

          <div class="field">
            <label for="mobileInput">手机号</label>
            <input id="mobileInput" type="tel" inputmode="numeric" maxlength="11" placeholder="请输入手机号" />
          </div>
        </form>
            </section>
    </main>

    <div class="submit-bar">
      <button class="primary-button" id="submitButton" type="submit" form="checkinForm" disabled>完成签到</button>
    </div>
  </div>

  <script>
    const targetLocation = {
      lat: 31.2304,
      lng: 121.4737,
      name: "上海活动签到点"
    };

    const state = {
      distance: null,
      canCheckIn: false
    };

    const mapStage = document.getElementById("mapStage");
    const mapUserPoint = document.getElementById("mapUserPoint");
    const locationMeta = document.getElementById("locationMeta");
    const relocateButton = document.getElementById("relocateButton");
    const checkinForm = document.getElementById("checkinForm");
    const submitButton = document.getElementById("submitButton");
    const checkinStatus = document.getElementById("checkinStatus");
    const nameInput = document.getElementById("nameInput");
    const mobileInput = document.getElementById("mobileInput");

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function setStatus(title, desc, stateName) {
      checkinStatus.dataset.state = stateName || "";
      checkinStatus.innerHTML = `
        <p class="status-box__title">${title}</p>
        <p class="status-box__desc">${desc}</p>
      `;
    }

    function updateSubmitState() {
      state.canCheckIn = typeof state.distance === "number" && state.distance <= 500;
      submitButton.disabled = !state.canCheckIn;
    }

    function renderLocation(distance, sourceLabel) {
      state.distance = Math.round(distance);
      updateSubmitState();

      const angle = Math.PI / 3;
      const radius = clamp((state.distance / 500) * 70, 12, 88);
      const offsetX = Math.cos(angle) * radius;
      const offsetY = Math.sin(angle) * radius;

      mapUserPoint.style.left = `calc(50% + ${offsetX}px)`;
      mapUserPoint.style.top = `calc(50% - ${offsetY}px)`;

      const inRange = state.distance <= 500;
      locationMeta.textContent = `${sourceLabel} · 距签到点约 ${state.distance}m`;

      if (inRange) {
        setStatus("定位成功，可完成签到", `当前位置距离签到点约 ${state.distance}m，已满足 500m 内签到要求。`, "success");
      } else {
        setStatus("定位成功，但超出签到范围", `当前位置距离签到点约 ${state.distance}m，请移动到签到点附近 500m 内再完成签到。`, "error");
      }
    }

    function toRadians(value) {
      return (value * Math.PI) / 180;
    }

    function getDistanceMeters(lat1, lng1, lat2, lng2) {
      const earthRadius = 6371000;
      const dLat = toRadians(lat2 - lat1);
      const dLng = toRadians(lng2 - lng1);
      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2)
        + Math.cos(toRadians(lat1)) * Math.cos(toRadians(lat2))
        * Math.sin(dLng / 2) * Math.sin(dLng / 2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return earthRadius * c;
    }

    function applyFallbackLocation() {
      renderLocation(286, "演示定位");
    }

    function locateUser() {
      if (!navigator.geolocation) {
        applyFallbackLocation();
        return;
      }

      locationMeta.textContent = "定位中...";
      navigator.geolocation.getCurrentPosition(
        (position) => {
          const distance = getDistanceMeters(
            position.coords.latitude,
            position.coords.longitude,
            targetLocation.lat,
            targetLocation.lng
          );
          renderLocation(distance, "系统定位");
        },
        () => {
          applyFallbackLocation();
        },
        {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 0
        }
      );
    }

    relocateButton.addEventListener("click", () => {
      locateUser();
    });

    checkinForm.addEventListener("submit", (event) => {
      event.preventDefault();

      const name = nameInput.value.trim();
      const mobile = mobileInput.value.trim();

      if (!name) {
        setStatus("请先填写姓名或称呼", "例如：张先生、李女士或张三。", "error");
        nameInput.focus();
        return;
      }

      if (!/^1\\d{10}$/.test(mobile)) {
        setStatus("手机号格式不正确", "请输入正确的 11 位手机号后再完成签到。", "error");
        mobileInput.focus();
        return;
      }

      if (!state.canCheckIn) {
        setStatus("暂不满足签到范围", "当前定位未进入签到点 500m 范围内，请重新定位或靠近签到点。", "error");
        return;
      }

      setStatus("签到成功", `${name} 已完成签到，系统已记录手机号 ${mobile}。`, "success");
    });

    locateUser();
  </script>
</body>
</html>
