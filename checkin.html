<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>活动签到</title>
  <style>
    :root {
      --brand-primary: #fd5d00;
      --brand-secondary: #ff8f2e;
      --brand-deep: #c74100;
      --text-primary: #303133;
      --text-secondary: #606266;
      --text-tertiary: #909399;
      --line-soft: #e4e7ed;
      --surface: #ffffff;
      --page-bg: #f4f6f8;
      --success: #34a853;
      --danger: #ff4d4f;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(255, 210, 181, 0.9), transparent 34%),
        linear-gradient(180deg, #fff8f2 0%, #f4f6f8 100%);
      color: var(--text-primary);
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      padding: 24px 12px;
    }

    button,
    input {
      font: inherit;
    }

    [hidden] {
      display: none !important;
    }

    .phone-shell {
      position: relative;
      width: min(100%, 375px);
      min-height: 812px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 18px 44px rgba(48, 49, 51, 0.14);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 58px;
      padding: calc(12px + env(safe-area-inset-top, 0px)) 16px 12px;
      background: rgba(255, 255, 255, 0.96);
      border-bottom: 1px solid rgba(228, 231, 237, 0.9);
      backdrop-filter: blur(14px);
    }

    .topbar__title {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.4;
    }

    .page-content {
      padding: 18px 16px calc(110px + env(safe-area-inset-bottom, 0px));
    }

    .form-card {
      display: grid;
      gap: 16px;
      padding: 20px 16px;
      background: var(--surface);
      box-shadow: 0 14px 30px rgba(17, 24, 39, 0.08);
    }

    .eyebrow {
      color: var(--brand-deep);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.4;
      letter-spacing: 0.06em;
    }

    .section-title {
      margin: 0;
      font-size: 22px;
      font-weight: 800;
      line-height: 1.35;
    }

    .section-desc {
      margin: 0;
      color: var(--text-secondary);
      font-size: 13px;
      line-height: 1.7;
    }

    #checkinForm {
      display: grid;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field label {
      color: var(--text-primary);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.4;
    }

    .field input {
      width: 100%;
      min-height: 48px;
      padding: 0 14px;
      border: 1px solid rgba(228, 231, 237, 0.96);
      background: #fff;
      color: var(--text-primary);
      outline: none;
    }

    .field input:focus {
      border-color: rgba(253, 93, 0, 0.38);
      box-shadow: 0 0 0 4px rgba(253, 93, 0, 0.08);
    }

    .radio-group {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .radio-card {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 12px;
      border: 1px solid rgba(228, 231, 237, 0.96);
      background: #ffffff;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 600;
      line-height: 1.5;
      cursor: pointer;
      transition: border-color 0.18s ease, background 0.18s ease, color 0.18s ease, box-shadow 0.18s ease;
    }

    .radio-card input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .radio-card.is-active {
      border-color: rgba(253, 93, 0, 0.36);
      background: rgba(255, 242, 233, 0.98);
      color: var(--brand-deep);
      box-shadow: 0 10px 20px rgba(253, 93, 0, 0.08);
    }

    .mobile-row {
      display: flex;
      align-items: stretch;
      gap: 10px;
    }

    .mobile-row input {
      flex: 1;
      min-width: 0;
    }

    .ghost-button {
      min-width: 118px;
      min-height: 48px;
      padding: 0 14px;
      border: 1px solid rgba(253, 93, 0, 0.18);
      background: rgba(255, 245, 235, 0.96);
      color: var(--brand-deep);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .status-box {
      padding: 12px 14px;
      background: #f8fafc;
      border-left: 3px solid rgba(253, 93, 0, 0.36);
    }

    .status-box__title {
      margin: 0;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.5;
    }

    .status-box__desc {
      margin: 6px 0 0;
      color: var(--text-secondary);
      font-size: 12px;
      line-height: 1.6;
    }

    .status-box[data-state="success"] {
      border-left-color: rgba(52, 168, 83, 0.72);
      background: rgba(52, 168, 83, 0.08);
    }

    .status-box[data-state="error"] {
      border-left-color: rgba(255, 77, 79, 0.72);
      background: rgba(255, 77, 79, 0.08);
    }

    .submit-bar {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 12px 16px calc(18px + env(safe-area-inset-bottom, 0px));
      background: linear-gradient(180deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.94) 26%, #fff 100%);
    }

    .primary-button {
      width: 100%;
      min-height: 48px;
      border: none;
      background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      box-shadow: 0 14px 26px rgba(253, 93, 0, 0.24);
      cursor: pointer;
    }

    @media (max-width: 360px) {
      .mobile-row {
        flex-direction: column;
      }

      .ghost-button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="phone-shell">
    <header class="topbar">
      <div class="topbar__title">活动签到</div>
    </header>

    <main class="page-content">
      <section class="form-card">
        <span class="eyebrow">活动签到</span>
        <h1 class="section-title">填写签到信息</h1>
        <p class="section-desc">请选择邀请方式后填写基础信息，提交即可完成签到。</p>

        <form id="checkinForm">
          <div class="field">
            <label>是否定向邀请</label>
            <div class="radio-group" role="radiogroup" aria-label="是否定向邀请">
              <label class="radio-card is-active">
                <input type="radio" name="inviteType" value="no" checked />
                <span>非定向邀请</span>
              </label>
              <label class="radio-card">
                <input type="radio" name="inviteType" value="yes" />
                <span>定向邀请</span>
              </label>
            </div>
          </div>

          <div class="field">
            <label for="salutationInput">称呼</label>
            <input id="salutationInput" type="text" placeholder="例如：张先生 / 李女士" />
          </div>

          <div class="field">
            <label for="mobileInput">手机号</label>
            <div class="mobile-row">
              <input id="mobileInput" type="tel" inputmode="numeric" maxlength="11" placeholder="请输入手机号" />
              <button class="ghost-button" id="authorizeMobileButton" type="button">授权获取手机号</button>
            </div>
          </div>

          <div class="field" id="companyField" hidden>
            <label for="companyInput">单位</label>
            <input id="companyInput" type="text" placeholder="请输入单位名称" />
          </div>

          <div class="status-box" id="checkinStatus">
            <p class="status-box__title">请先填写签到信息</p>
            <p class="status-box__desc">非定向邀请填写称呼和手机号，定向邀请需要额外填写单位。</p>
          </div>
        </form>
      </section>
    </main>

    <div class="submit-bar">
      <button class="primary-button" id="submitButton" type="submit" form="checkinForm">完成签到</button>
    </div>
  </div>

  <script>
    const inviteTypeInputs = Array.from(document.querySelectorAll('input[name="inviteType"]'));
    const radioCards = Array.from(document.querySelectorAll(".radio-card"));
    const checkinForm = document.getElementById("checkinForm");
    const checkinStatus = document.getElementById("checkinStatus");
    const salutationInput = document.getElementById("salutationInput");
    const mobileInput = document.getElementById("mobileInput");
    const companyField = document.getElementById("companyField");
    const companyInput = document.getElementById("companyInput");
    const authorizeMobileButton = document.getElementById("authorizeMobileButton");

    function setStatus(title, desc, stateName) {
      checkinStatus.dataset.state = stateName || "";
      checkinStatus.innerHTML = `
        <p class="status-box__title">${title}</p>
        <p class="status-box__desc">${desc}</p>
      `;
    }

    function normalizeMobile(value) {
      return String(value || "").replace(/\D/g, "").slice(0, 11);
    }

    function getInviteType() {
      const checked = inviteTypeInputs.find((input) => input.checked);
      return checked ? checked.value : "no";
    }

    function updateInviteMode() {
      const directed = getInviteType() === "yes";

      radioCards.forEach((card) => {
        const input = card.querySelector('input[name="inviteType"]');
        card.classList.toggle("is-active", Boolean(input && input.checked));
      });

      companyField.hidden = !directed;
      if (!directed) {
        companyInput.value = "";
      }

      setStatus(
        directed ? "请填写定向邀请信息" : "请填写签到信息",
        directed
          ? "定向邀请需要补充单位信息，提交后即可完成签到。"
          : "非定向邀请仅需填写称呼和手机号。",
        ""
      );
    }

    function getWechatPhoneInvoker() {
      if (window.wx && typeof window.wx.invoke === "function") {
        return window.wx;
      }
      if (window.WeixinJSBridge && typeof window.WeixinJSBridge.invoke === "function") {
        return window.WeixinJSBridge;
      }
      return null;
    }

    function handlePhoneAuthorize() {
      const invoker = getWechatPhoneInvoker();
      if (!invoker) {
        mobileInput.value = "13800138000";
        setStatus("已模拟授权手机号", "当前原型已预留微信手机号接口按钮，正式接入后可自动回填真实手机号。", "success");
        return;
      }

      setStatus("等待微信授权", "请在微信授权弹层内确认手机号；如当前环境未完成接口接入，会保留演示模式。", "");

      try {
        invoker.invoke("getPhoneNumber", {}, (response) => {
          const phone = normalizeMobile(response && (response.phoneNumber || response.purePhoneNumber || ""));
          if (phone.length === 11) {
            mobileInput.value = phone;
            setStatus("手机号授权成功", `已回填手机号 ${phone}。`, "success");
            return;
          }

          if (!mobileInput.value) {
            mobileInput.value = "13800138000";
          }
          setStatus("手机号接口待接入", "当前原型已预留微信手机号授权入口，正式环境可在这里接入解密与回填逻辑。", "");
        });
      } catch (error) {
        mobileInput.value = mobileInput.value || "13800138000";
        setStatus("手机号授权暂不可用", "当前环境未返回真实授权结果，已保留演示号码，后续可直接替换为正式接口。", "");
      }
    }

    inviteTypeInputs.forEach((input) => {
      input.addEventListener("change", updateInviteMode);
    });

    mobileInput.addEventListener("input", () => {
      mobileInput.value = normalizeMobile(mobileInput.value);
    });

    authorizeMobileButton.addEventListener("click", handlePhoneAuthorize);

    checkinForm.addEventListener("submit", (event) => {
      event.preventDefault();

      const salutation = salutationInput.value.trim();
      const mobile = normalizeMobile(mobileInput.value);
      const directed = getInviteType() === "yes";
      const company = companyInput.value.trim();

      if (!salutation) {
        setStatus("请先填写称呼", "例如：张先生、李女士。", "error");
        salutationInput.focus();
        return;
      }

      if (!/^1\d{10}$/.test(mobile)) {
        setStatus("手机号格式不正确", "请输入正确的 11 位手机号后再完成签到。", "error");
        mobileInput.focus();
        return;
      }

      if (directed && !company) {
        setStatus("请先填写单位", "定向邀请签到需要补充单位信息。", "error");
        companyInput.focus();
        return;
      }

      const companyDesc = directed ? `，单位 ${company}` : "";
      setStatus("签到成功", `${salutation} 已完成签到，系统已记录手机号 ${mobile}${companyDesc}。`, "success");
    });

    updateInviteMode();
  </script>
</body>
</html>
