<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登记用户信息表后台</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="admin-body">
  <header class="admin-topbar">
    <div class="admin-topbar__brand">
      <div class="admin-logo">H</div>
      <div>
        <div class="admin-topbar__title">成都住建线上房产超市管理平台</div>
        <div class="admin-topbar__subtitle">运营中心 / 登记用户信息表</div>
      </div>
    </div>

    <nav class="admin-topbar__nav" aria-label="平台导航">
      <a class="admin-topbar__link" href="javascript:void(0)">项目</a>
      <a class="admin-topbar__link" href="javascript:void(0)">申请</a>
      <a class="admin-topbar__link is-active" href="javascript:void(0)">运营</a>
      <a class="admin-topbar__link" href="javascript:void(0)">统计</a>
      <a class="admin-topbar__link" href="javascript:void(0)">系统</a>
    </nav>

    <div class="admin-user">
      <span class="admin-user__avatar">周</span>
      <span class="admin-user__name">周世杰</span>
    </div>
  </header>

  <main class="admin-shell admin-shell--compact">
    <section class="admin-pagehead">
      <div>
        <div class="admin-pagehead__eyebrow">登记活动运营</div>
        <h1 class="admin-pagehead__title">登记用户信息表</h1>
        <p class="admin-pagehead__desc">主页面只保留查询和列表，消息推送通过弹窗处理，最近一条推送文案会直接回写到列表中展示。</p>
      </div>
      <div class="admin-pagehead__actions">
        <a class="button button--secondary" href="../房产超市_住进成都.html" target="_blank" rel="noreferrer">查看活动详情页</a>
        <button class="button button--ghost" type="button" id="resetDemoBtn">重置示例数据</button>
      </div>
    </section>

    <section class="panel panel--filter">
      <div class="list-toolbar">
        <div>
          <div class="panel__eyebrow">查询条件</div>
          <h2 class="panel__title">登记用户列表</h2>
          <p class="panel__desc">支持按城市、区县、活动和跟进状态筛选；有勾选时优先对已选用户批量推送，否则默认对当前筛选结果推送。</p>
        </div>
        <button class="button button--primary" type="button" id="batchPushBtn">批量推送</button>
      </div>

      <div class="filter-grid filter-grid--records">
        <label class="form-item">
          <span class="form-item__label">城市</span>
          <select class="form-item__control" id="cityFilterSelect"></select>
        </label>
        <label class="form-item">
          <span class="form-item__label">区县</span>
          <select class="form-item__control" id="districtFilterSelect"></select>
        </label>
        <label class="form-item">
          <span class="form-item__label">活动名称</span>
          <select class="form-item__control" id="activityFilterSelect"></select>
        </label>
        <label class="form-item">
          <span class="form-item__label">跟进状态</span>
          <select class="form-item__control" id="recordStatusFilterSelect">
            <option value="all">全部状态</option>
            <option value="new">待跟进</option>
            <option value="pushed">已推送</option>
            <option value="contacted">已联系</option>
          </select>
        </label>
        <label class="form-item form-item--stretch">
          <span class="form-item__label">关键词</span>
          <input class="form-item__control" id="keywordFilterInput" type="text" placeholder="搜索姓名、手机号、活动名称或区县" />
        </label>
      </div>
    </section>

    <div class="selection-toolbar">
      <div class="selection-toolbar__summary" id="selectionSummary">当前未选择登记用户</div>
      <div class="toolbar-actions">
        <button class="button button--ghost button--small" type="button" id="selectFilteredBtn">全选当前筛选结果</button>
        <button class="button button--ghost button--small" type="button" id="clearSelectionBtn">清空已选</button>
      </div>
    </div>

    <section class="panel">
      <div class="table-shell">
        <table class="admin-table admin-table--records">
          <thead>
            <tr>
              <th class="table-check"></th>
              <th>登记用户</th>
              <th>手机号</th>
              <th>城市</th>
              <th>区县</th>
              <th>活动名称</th>
              <th>活动时间</th>
              <th>登记时间</th>
              <th>状态</th>
              <th>消息展示</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="recordTableBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <div class="modal-backdrop" id="modalBackdrop" hidden></div>

  <section class="modal" id="pushModal" hidden aria-hidden="true">
    <div class="modal__dialog modal__dialog--md">
      <header class="modal__header">
        <div>
          <div class="modal__eyebrow">消息推送</div>
          <h2 class="modal__title" id="pushModalTitle">批量推送</h2>
          <p class="modal__desc">输入推送文案后即可发送，最近一条消息会同步展示在登记用户列表中。</p>
        </div>
        <button class="modal__close" type="button" data-close-modal="pushModal" aria-label="关闭">×</button>
      </header>

      <div class="modal__body modal__body--stack">
        <label class="form-item">
          <span class="form-item__label">推送渠道</span>
          <select class="form-item__control" id="pushChannelSelect"></select>
        </label>
        <label class="form-item">
          <span class="form-item__label">推送标题</span>
          <input class="form-item__control" id="pushTitleInput" type="text" placeholder="请输入推送标题" />
        </label>
        <label class="form-item">
          <span class="form-item__label">推送文案</span>
          <textarea class="form-item__control form-item__control--textarea form-item__control--tall" id="pushContentInput" placeholder="请输入推送文案"></textarea>
        </label>
        <div class="push-target-note" id="pushTargetSummary">请选择用户后再发起推送。</div>
      </div>

      <footer class="modal__footer">
        <button class="button button--ghost" type="button" data-close-modal="pushModal">取消</button>
        <button class="button button--primary" type="button" id="confirmPushBtn">确认推送</button>
      </footer>
    </div>
  </section>

  <script src="./shared.js"></script>
  <script src="./admin.js"></script>
</body>
</html>
