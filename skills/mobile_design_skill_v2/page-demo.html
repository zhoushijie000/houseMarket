<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>房产超市专题页 Demo</title>
  <link rel="stylesheet" href="./components.css" />
</head>
<body>
  <main class="mobile-page">
    <header class="topbar">
      <div class="topbar__title">郫都区专题</div>
    </header>

    <section class="topic-hero">
      <h1 class="topic-hero__title">西部新城·刚改 / 轨交关注</h1>
      <p class="topic-hero__desc">楼盘、活动、政策信息统一聚合展示</p>
      <div class="chips">
        <span class="chip">楼盘 12</span>
        <span class="chip">活动 3</span>
        <span class="chip">政策 4</span>
      </div>
    </section>

    <section class="page-section">
      <div class="section-title">
        <div class="section-title__text">在售楼盘</div>
        <div class="section-title__action">展开更多</div>
      </div>

      <article class="estate-card card">
        <div class="estate-card__thumb"></div>
        <div class="estate-card__body">
          <h3 class="estate-card__title">招商·时代花园</h3>
          <p class="estate-card__meta">天府新区 / 建面 120~130㎡</p>
          <p class="estate-card__desc">容积率 2.3</p>
          <div class="estate-card__footer">
            <div class="price">31000~32000 <small>元/㎡</small></div>
            <span class="stock-tag">剩余 30 套</span>
          </div>
        </div>
      </article>

      <article class="estate-card card">
        <div class="estate-card__thumb"></div>
        <div class="estate-card__body">
          <h3 class="estate-card__title">首开·龙湖紫宸</h3>
          <p class="estate-card__meta">成华区 / 建面 110~140㎡</p>
          <p class="estate-card__desc">容积率 2.3</p>
          <div class="estate-card__footer">
            <div class="price">32300~35600 <small>元/㎡</small></div>
            <span class="stock-tag">剩余 11 套</span>
          </div>
        </div>
      </article>

      <div class="section-title">
        <div class="section-title__text">线下活动</div>
      </div>

      <div class="info-list">
        <article class="info-item">
          <div class="info-item__tag">活动</div>
          <h4 class="info-item__title">招商·时代花园专场咨询</h4>
          <div class="info-item__meta">2026年1月20日 10:00 - 12:00</div>
          <div class="info-item__meta">郫都区房产超市服务点（XX路68号）</div>
        </article>

        <article class="info-item">
          <div class="info-item__tag">政策</div>
          <h4 class="info-item__title">郫都房地产市场健康发展的若干措施</h4>
          <div class="info-item__meta">2026年1月20日发布</div>
        </article>
      </div>
    </section>

    <div class="fixed-bar">
      <button class="btn btn--primary">咨询专题顾问</button>
    </div>
  </main>
</body>
</html>
