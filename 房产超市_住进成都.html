<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>房产超市 - 住进成都专题原型</title>
  <style>
    :root {
      --brand-primary: #fd5d00;
      --brand-secondary: #ff8f2e;
      --brand-deep: #c74100;
      --accent-green: #67cc35;
      --accent-red: #ff2828;
      --text-primary: #303133;
      --text-secondary: #606266;
      --text-tertiary: #909399;
      --text-quaternary: #c0c4cc;
      --line-soft: #e4e7ed;
      --page-bg: #f3f5f6;
      --surface: #ffffff;
      --surface-soft: #fff7f0;
      --surface-warm: #fff2e5;
      --surface-cool: #eef7f7;
      --shadow-card: 0 14px 32px rgba(48, 49, 51, 0.08);
      --shadow-float: 0 18px 44px rgba(253, 93, 0, 0.18);
      --radius-xs: 6px;
      --radius-sm: 10px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --radius-xl: 28px;
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-7: 28px;
      --space-8: 32px;
      --font-display: "Alibaba PuHuiTi 3.0", "PingFang SC", "Source Han Sans SC", "Microsoft YaHei", sans-serif;
      --font-body: "PingFang SC", "Source Han Sans SC", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(255, 212, 181, 0.9), transparent 36%),
        radial-gradient(circle at right 14%, rgba(255, 181, 132, 0.42), transparent 28%),
        linear-gradient(180deg, #fff9f4 0%, #f7f2ec 100%);
      color: var(--text-primary);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body {
      display: flex;
      justify-content: center;
      padding: 24px 12px;
    }

    button,
    input {
      font: inherit;
    }

    .phone-shell {
      position: relative;
      width: min(100%, 390px);
      min-height: 844px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0.98)),
        var(--page-bg);
      border-radius: 34px;
      box-shadow:
        0 24px 60px rgba(48, 49, 51, 0.12),
        inset 0 0 0 1px rgba(255, 255, 255, 0.75);
      overflow: hidden;
      isolation: isolate;
    }

    .phone-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(140deg, rgba(255, 244, 232, 0.95), transparent 36%),
        radial-gradient(circle at right top, rgba(253, 93, 0, 0.08), transparent 36%);
      pointer-events: none;
      z-index: 0;
    }

    .page-stack,
    .screen {
      position: relative;
      z-index: 1;
      height: 100%;
    }

    .screen {
      display: none;
      height: 844px;
      overflow-y: auto;
      scrollbar-width: none;
      animation: screen-enter 320ms ease;
    }

    .screen::-webkit-scrollbar {
      display: none;
    }

    .screen.is-active {
      display: block;
    }

    .page-content {
      padding: 18px 16px calc(44px + env(safe-area-inset-bottom, 0px));
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 6;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: calc(12px + env(safe-area-inset-top, 0px)) 16px 12px;
      backdrop-filter: blur(18px);
      background: linear-gradient(180deg, rgba(255, 250, 245, 0.92), rgba(255, 250, 245, 0.72));
      border-bottom: 1px solid rgba(228, 231, 237, 0.7);
    }

    .topbar__meta,
    .topbar__action {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .topbar__meta {
      width: 100%;
      min-height: 24px;
    }

    .topbar__city {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(255, 143, 46, 0.14);
      color: var(--brand-deep);
      font-size: 12px;
      font-weight: 600;
    }

    .topbar__title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-align: center;
      white-space: nowrap;
    }

    .icon-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border: none;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 10px 22px rgba(48, 49, 51, 0.08);
      cursor: pointer;
      color: var(--text-primary);
    }

    .back-button {
      position: relative;
      z-index: 1;
      border: none;
      padding: 0;
      background: transparent;
      color: var(--text-primary);
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
    }

    .hero-card {
      position: relative;
      overflow: hidden;
      padding: 12px;
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(255, 247, 239, 0.96));
      box-shadow: var(--shadow-card);
    }

    .hero-card::after {
      display: none;
    }

    .hero-card__cover {
      position: relative;
      min-height: 188px;
      border-radius: 20px;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(10, 18, 28, 0.05), rgba(10, 18, 28, 0.38)),
        url("./assets/d86e2b37c94f42fcb022f0376ae8a0cf.jpg") center / cover no-repeat;
      box-shadow: inset 0 -24px 44px rgba(10, 18, 28, 0.18);
    }

    .hero-card__cover::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(10, 18, 28, 0.22));
      pointer-events: none;
    }

    .hero-card__cover-badge {
      position: absolute;
      left: 14px;
      top: 14px;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      backdrop-filter: blur(8px);
    }

    .hero-card__cover-play {
      position: absolute;
      right: 14px;
      bottom: 14px;
      z-index: 1;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.22);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      backdrop-filter: blur(10px);
    }

    .hero-card__eyebrow {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.68);
      color: var(--brand-deep);
      font-size: 12px;
      font-weight: 700;
    }

    .hero-card__title {
      position: relative;
      flex: 1 1 auto;
      margin: 0;
      font-family: var(--font-display);
      font-size: 18px;
      line-height: 1.35;
      font-weight: 700;
    }

    .hero-card__desc {
      position: relative;
      margin: 0;
      color: var(--text-secondary);
      line-height: 1.6;
      font-size: 12px;
    }

    .hero-card__heading {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-top: 12px;
    }

    .section {
      margin-top: 16px;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .section-head h2 {
      margin: 0;
      font-family: var(--font-display);
      font-size: 17px;
      font-weight: 700;
    }

    .section-head p {
      margin: 4px 0 0;
      font-size: 12px;
      color: var(--text-tertiary);
    }

    .section-link {
      border: none;
      background: transparent;
      color: var(--brand-primary);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .shortcut-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .shortcut-card {
      padding: 14px 8px 12px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: var(--shadow-card);
      text-align: center;
    }

    .shortcut-card__icon {
      width: 42px;
      height: 42px;
      margin: 0 auto 10px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-size: 18px;
      background: linear-gradient(180deg, rgba(255, 143, 46, 0.16), rgba(253, 93, 0, 0.08));
    }

    .shortcut-card strong {
      display: block;
      font-size: 14px;
      font-weight: 700;
    }

    .shortcut-card span {
      display: block;
      margin-top: 4px;
      color: var(--text-tertiary);
      font-size: 11px;
      line-height: 1.4;
    }

    .topic-banner {
      position: relative;
      overflow: hidden;
      padding: 18px;
      border: none;
      width: 100%;
      border-radius: 24px;
      background:
        radial-gradient(circle at top right, rgba(255, 255, 255, 0.24), transparent 26%),
        linear-gradient(135deg, #d9571d 0%, #fd7e22 42%, #ffb65f 100%);
      color: #fff;
      text-align: left;
      box-shadow: var(--shadow-float);
      cursor: pointer;
    }

    .topic-banner__tag {
      display: inline-flex;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .topic-banner__title {
      margin: 14px 0 8px;
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 700;
    }

    .topic-banner__desc {
      margin: 0;
      max-width: 250px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.88);
      font-size: 13px;
    }

    .topic-banner__cta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 18px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
    }

    .listing-grid {
      display: grid;
      gap: 12px;
    }

    .listing-card {
      display: grid;
      grid-template-columns: 88px minmax(0, 1fr);
      align-items: stretch;
      gap: 12px;
      padding: 12px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: var(--shadow-card);
    }

    .listing-card__media {
      position: relative;
      width: 88px;
      min-width: 88px;
      height: 104px;
      border-radius: 14px;
      overflow: hidden;
      align-self: stretch;
      background: #eef1f5;
    }

    .listing-card__media-image {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .listing-card__body {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .listing-card__title {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.35;
    }

    .listing-card__meta,
    .listing-card__tagline {
      margin: 0;
      color: var(--text-secondary);
      font-size: 12px;
      line-height: 1.55;
    }

    .listing-card__tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .listing-card__tag {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(253, 93, 0, 0.1);
      color: var(--brand-deep);
      font-size: 11px;
      line-height: 1;
      white-space: nowrap;
    }

    .listing-card__footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: auto;
      min-width: 0;
    }

    .listing-card__price {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      color: var(--brand-primary);
      font-family: var(--font-display);
      font-size: 20px;
      line-height: 1;
      font-weight: 700;
      white-space: nowrap;
    }

    .listing-card__price span,
    .listing-card__price small {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-tertiary);
    }

    .listing-card__stock {
      flex: 0 0 auto;
      min-width: 62px;
      max-width: 62px;
      min-height: 38px;
      padding: 6px 8px;
      border-radius: 999px;
      background: rgba(255, 40, 40, 0.08);
      color: #d73a49;
      font-size: 11px;
      line-height: 1.25;
      text-align: center;
    }

    .listing-card__video {
      margin-top: 8px;
      padding: 10px;
      border-radius: 16px;
      background: rgba(49, 93, 117, 0.08);
    }

    .listing-card__video-cover,
    .listing-card__report-cover {
      position: relative;
      overflow: hidden;
      border-radius: 14px;
      aspect-ratio: 16 / 9;
      background: #eef1f5;
    }

    .listing-card__video-cover img,
    .listing-card__report-cover img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .listing-card__video-play {
      position: absolute;
      right: 10px;
      bottom: 10px;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(17, 24, 39, 0.72);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      backdrop-filter: blur(8px);
    }

    .listing-card__creator {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }

    .listing-card__avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, #fd7b22, #fd5d00);
    }

    .listing-card__creator-name {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .listing-card__video-tag {
      display: inline-flex;
      padding: 5px 9px;
      border-radius: 999px;
      background: rgba(49, 93, 117, 0.12);
      color: #315d75;
      font-size: 11px;
      font-weight: 700;
    }

    .listing-card__video-title {
      margin: 8px 0 4px;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.5;
    }

    .listing-card__video-meta {
      margin: 0;
      color: var(--text-secondary);
      font-size: 11px;
      line-height: 1.6;
    }

    .listing-card__report {
      width: 100%;
      margin-top: 8px;
      padding: 10px;
      border: none;
      border-radius: 16px;
      background: rgba(253, 93, 0, 0.08);
      text-align: left;
      cursor: pointer;
    }

    .listing-card__report-tag {
      display: inline-flex;
      padding: 5px 9px;
      border-radius: 999px;
      background: rgba(253, 93, 0, 0.12);
      color: var(--brand-deep);
      font-size: 11px;
      font-weight: 700;
    }

    .listing-card__report-title {
      margin: 8px 0 4px;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.5;
      color: var(--text-primary);
    }

    .listing-card__report-meta {
      margin: 0;
      color: var(--text-secondary);
      font-size: 11px;
      line-height: 1.6;
    }

    .detail-hero {
      padding: 20px;
      border-radius: var(--radius-xl);
      background:
        radial-gradient(circle at right top, rgba(255, 255, 255, 0.2), transparent 30%),
        linear-gradient(135deg, #243949 0%, #315d75 48%, #4c7b78 100%);
      color: #fff;
      box-shadow: var(--shadow-card);
    }

    .detail-hero__eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      font-size: 12px;
      font-weight: 700;
    }

    .detail-hero h1 {
      margin: 16px 0 8px;
      font-family: var(--font-display);
      font-size: 30px;
      line-height: 1.15;
    }

    .detail-hero p {
      margin: 0;
      color: rgba(255, 255, 255, 0.84);
      font-size: 14px;
      line-height: 1.7;
    }

    .detail-hero__badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 18px;
    }

    .detail-hero__badge {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      font-size: 12px;
    }

    .toolbar-card,
    .panel-card {
      padding: 16px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: var(--shadow-card);
    }

    .toolbar-card {
      margin-top: 18px;
    }

    .toolbar-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
    }

    .toolbar-row p {
      margin: 6px 0 0;
      color: var(--text-tertiary);
      font-size: 12px;
      line-height: 1.5;
    }

    .primary-button,
    .ghost-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease;
    }

    .primary-button {
      background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
      color: #fff;
      box-shadow: 0 14px 26px rgba(253, 93, 0, 0.24);
    }

    .ghost-button {
      background: rgba(255, 143, 46, 0.12);
      color: var(--brand-deep);
    }

    .primary-button:active,
    .ghost-button:active,
    .icon-button:active {
      transform: translateY(1px);
    }

    .filter-chips {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
    }

    .filter-chips::-webkit-scrollbar {
      display: none;
    }

    .chip {
      flex: 0 0 auto;
      padding: 10px 14px;
      border-radius: 999px;
      border: none;
      background: #f5f7fa;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 160ms ease, color 160ms ease, transform 160ms ease;
    }

    .chip.is-active {
      background: rgba(255, 143, 46, 0.18);
      color: var(--brand-deep);
      box-shadow: inset 0 0 0 1px rgba(253, 93, 0, 0.18);
    }

    .chip.is-match {
      outline: 2px solid rgba(103, 204, 53, 0.28);
      outline-offset: 1px;
    }

    .city-card-grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 12px;
      margin-top: 14px;
    }

    .city-card {
      position: relative;
      overflow: hidden;
      display: block;
      min-height: 92px;
      padding: 14px 16px 13px;
      border: none;
      border-radius: 24px;
      background: #243949;
      box-shadow: 0 18px 34px rgba(17, 24, 39, 0.18);
      text-align: left;
      cursor: pointer;
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    .city-card:active {
      transform: translateY(1px);
    }

    .city-card.is-active {
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.32),
        0 20px 38px rgba(17, 24, 39, 0.22);
    }

    .city-card__backdrop {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(135deg, rgba(18, 24, 38, 0.22), rgba(18, 24, 38, 0.54)),
        var(--city-card-cover);
      background-size: cover;
      background-position: center;
      transform: scale(1.02);
    }

    .city-card__content {
      position: relative;
      z-index: 1;
      display: grid;
      align-content: start;
      gap: 6px;
      min-height: 92px;
      color: #fff;
    }

    .city-card__eyebrow {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: fit-content;
      max-width: 100%;
      min-height: 24px;
      padding: 0 9px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.16);
      backdrop-filter: blur(12px);
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
    }

    .city-card__name {
      display: block;
      font-size: 18px;
      font-weight: 700;
      line-height: 1.2;
      color: #fff;
      letter-spacing: 0.01em;
    }

    .city-card__summary {
      display: -webkit-box;
      overflow: hidden;
      color: rgba(255, 255, 255, 0.94);
      font-size: 12px;
      font-weight: 600;
      line-height: 1.35;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
    }

    .city-card-grid__empty {
      margin: 8px 0 0;
      padding: 18px 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.92);
      color: var(--text-secondary);
      font-size: 13px;
      text-align: center;
      box-shadow: var(--shadow-card);
    }

    .city-card__footer {
      display: flex;
      align-items: center;

    function parseActivityDatePart(value) {
      const match = String(value).trim().match(/^(\d{4})\.(\d{2})\.(\d{2})(?:\s+(\d{1,2}):(\d{2}))?$/);
      if (!match) {
        return null;
      }

      const [, year, month, day, hour = "0", minute = "0"] = match;
      return new Date(Number(year), Number(month) - 1, Number(day), Number(hour), Number(minute), 0, 0);
    }

    function getActivityTimeRange(timeText) {
      const [startRaw, endRaw] = String(timeText).split(/\s+-\s+/);
      const start = parseActivityDatePart(startRaw);
      if (!start) {
        return { start: null, end: null };
      }

      if (!String(startRaw).includes(":")) {
        start.setHours(0, 0, 0, 0);
      }

      let end = null;
      if (endRaw && /^\d{1,2}:\d{2}$/.test(endRaw.trim())) {
        const [hour, minute] = endRaw.trim().split(":");
        end = new Date(start);
        end.setHours(Number(hour), Number(minute), 0, 0);
      } else if (endRaw) {
        end = parseActivityDatePart(endRaw);
      }

      if (!end) {
        end = new Date(start);
      }

      if (!String(endRaw || "").includes(":")) {
        end.setHours(23, 59, 59, 999);
      }

      return { start, end };
    }

    function getActivityStatusMeta(timeText) {
      const { start, end } = getActivityTimeRange(timeText);
      const now = new Date();

      if (!start || !end) {
        return { label: "已开展", className: "activity-status-pill--ended" };
      }

      if (now < start) {
        return { label: "未开展", className: "activity-status-pill--signup" };
      }

      if (now > end) {
        return { label: "已开展", className: "activity-status-pill--ended" };
      }

      return { label: "开展中", className: "activity-status-pill--live" };
    }

    function getActivityPayload(groupIndex, itemIndex) {
      const group = cityActivities[groupIndex];
      const item = group.items[itemIndex];
      const start = (groupIndex + itemIndex) % estateTemplates.length;
      const estates = [0, 1, 2].map((offset) => {
        const template = estateTemplates[(start + offset) % estateTemplates.length];
        const metaParts = template.meta.split(" · ");
        const districtName = metaParts[0];
        const stockCount = Math.max(12, 36 - groupIndex * 5 - itemIndex * 4 - offset * 7);
        return {
          ...template,
          districtName,
          tagline: `${group.city}专场重点推荐，围绕“${item.title}”延展讲解，${template.keyword}。`,
          desc: template.keyword,
          tags: template.tags || [],
          stock: `剩余 ${stockCount} 套`
        };
      });

      const districts = estates.reduce((items, estate) => {
        if (items.some((district) => district.name === estate.districtName)) {
          return items;
        }

        items.push({
          name: estate.districtName,
          projectCount: estates.filter((currentEstate) => currentEstate.districtName === estate.districtName).length
        });
        return items;
      }, []);

      return { group, item, estates, districts, groupIndex, itemIndex };
    }

    function bindReportGallery() {
      const gallery = reportPage.querySelector("[data-report-gallery]");
      if (!gallery) {
        return;
      }

      const slides = Array.from(gallery.querySelectorAll(".report-photo"));
      const dots = Array.from(reportPage.querySelectorAll("[data-report-gallery-dot]"));

      if (!slides.length) {
        return;
      }

      const getStep = () => {
        const styles = window.getComputedStyle(gallery);
        const gap = parseFloat(styles.columnGap || styles.gap || 0);
        return (slides[0].offsetWidth || gallery.clientWidth || 1) + gap;
      };

      const updateState = () => {
        const index = Math.max(0, Math.min(slides.length - 1, Math.round(gallery.scrollLeft / getStep())));

        dots.forEach((dot, dotIndex) => {
          dot.classList.toggle("is-active", dotIndex === index);
        });
      };

      gallery.addEventListener("scroll", updateState, { passive: true });

      dots.forEach((dot) => {
        dot.addEventListener("click", () => {
          const index = Number(dot.dataset.reportGalleryDot);
          gallery.scrollTo({
            left: getStep() * index,
            behavior: "smooth"
          });
        });
      });

      window.requestAnimationFrame(updateState);
    }

                ${estate.tags.map((tag) => `<span class="listing-card__tag">${tag}</span>`).join("")}
              </div>
              <div class="listing-card__footer">
                <div class="listing-card__price">${estate.price}<span> 万起</span> <small>总价</small></div>
                <div class="listing-card__stock">${estate.stock}</div>
              </div>
            </div>
          </article>
        `)
        .join("");

      renderDistrictContent();
    }

    function openActivityDetail(groupIndex, itemIndex) {
      renderActivityDetail(groupIndex, itemIndex);
      showScreen("activity");
    }

    function addChatMessage(role, content) {
      const wrapper = document.createElement("div");
      wrapper.className = `chat-message chat-message--${role}`;
      const bubbleContent = role === "bot" ? String(content) : formatPlainTextHtml(content);
      wrapper.innerHTML = `
        <div class="chat-avatar">${role === "bot" ? "🤖" : "我"}</div>
        <div class="chat-bubble">${bubbleContent}</div>
      `;
      chatMessages.appendChild(wrapper);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function renderQuickQuestions(actions = quickQuestions.map((question) => ({
      type: "question",
      label: question,
      value: question
    })), useGrid = false) {
      chatQuickList.classList.toggle("chat-quick-list--grid", useGrid);
      chatQuickList.innerHTML = actions
        .map((action) => {
          const classNames = ["chat-quick"];
          if (action.type !== "question") {
            classNames.push("chat-quick--option");
          }

          const stepAttr = action.step ? ` data-step="${action.step}"` : "";
          const valueAttr = action.value ? ` data-value="${action.value}"` : "";
          return `<button class="${classNames.join(" ")}" type="button" data-chat-action="${action.type}"${stepAttr}${valueAttr}>${action.label}</button>`;
        })
        .join("");
    }

    function resetChatQuickQuestions() {
      activeChatFlow = null;
      suspendedTalentAssessment = null;
      chatInput.placeholder = defaultChatPlaceholder;
      renderQuickQuestions();
    }

    function promptTalentCheckStep() {
      const step = talentCheckSteps[activeChatFlow.stepIndex];
      if (!step) {
        return;
      }

      addChatMessage("bot", step.prompt);
      renderQuickQuestions(getTalentStepQuickActions(step), true);
    }

    function getTalentStepQuickActions(step) {
      return [
        ...step.options.map((option) => ({
          type: "talent-choice",
          label: option.label,
          value: option.value,
          step: step.id
        })),
        {
          type: "talent-policy",
          label: "政策详情"
        },
        {
          type: "talent-apply",
          label: "人才申请"
        }
      ];
    }

    function getTalentCheckConclusion(answers) {
      const hasStrongEducation = answers.education === "high";
      const hasEducationBase = hasStrongEducation || answers.education === "mid";
      const hasJobBase = answers.employment === "social" || answers.employment === "offer";
      const hasStrongJobBase = answers.employment === "social";
      const materialsFull = answers.materials === "full";
      const materialsPartial = answers.materials === "partial";

      if (hasStrongEducation && hasJobBase && materialsFull) {
        return {
          qualified: true,
          message: "初步结论：你符合成都人才条件。"
        };
      }

      if (hasEducationBase && hasJobBase && (materialsFull || materialsPartial)) {
        return {
          qualified: false,
          message: "初步结论：你有较大概率按成都人才口径申请。"
        };
      }

      if (hasEducationBase && !hasJobBase) {
        return {
          qualified: false,
          message: "初步结论：你目前更像具备人才基础，但缺少成都工作或社保资料，暂不能直接判断为符合。\n建议下一步：补充成都单位 offer、劳动合同或社保证明后再测。"
        };
      }

      if (!hasEducationBase && hasStrongJobBase && materialsFull) {
        return {
          qualified: false,
          message: "初步结论：按当前政策口径，人才证明基础还不够强，建议先补充学历或职称材料后再核验。"
        };
      }

      return {
        qualified: false,
        message: "初步结论：按当前口径，你暂不符合成都人才初筛条件。"
      };
    }

    function startTalentEligibilityCheck(activityTitle = "成都人才安家专场") {
      activeChatFlow = {
        type: "talent-entry",
        activityTitle
      };
      suspendedTalentAssessment = null;

      chatMessages.innerHTML = "";
      openChatDrawer("", {
        placeholder: "可先点下方入口，也可以继续补充你的问题"
      });
      addChatMessage("bot", `<strong>当前专场</strong><br>${escapeHtml(activityTitle)}<br><br>先选择你要办理的内容，我再继续帮你。`);
      renderQuickQuestions(getTalentEntryActions(activityTitle), true);
    }

    function startTalentAssessmentFlow(activityTitle = "成都人才安家专场") {
      activeChatFlow = {
        type: "talent-check",
        stepIndex: 0,
        answers: {},
        activityTitle
      };

      chatInput.placeholder = "请按下方资料选项完成初筛，也可以补充说明";
      addChatMessage("bot", "先做人才评定，请按下方资料情况逐步选择。");
      promptTalentCheckStep();
    }

    function openTalentPolicyChooser(activityTitle) {
      const resolvedActivityTitle = activityTitle
        || (activeChatFlow && activeChatFlow.activityTitle)
        || (currentActivityPayload ? currentActivityPayload.item.title : "成都人才安家专场");

      if (activeChatFlow && activeChatFlow.type === "talent-check") {
        suspendedTalentAssessment = {
          ...activeChatFlow,
          answers: { ...activeChatFlow.answers }
        };
      }

      activeChatFlow = {
        type: "talent-policy-select",
        activityTitle: resolvedActivityTitle
      };
      chatInput.placeholder = "先选一个区县查看政策，或继续补充你的问题";
      addChatMessage("bot", getTalentPolicyReply());
      renderQuickQuestions(getTalentPolicyDistrictActions(), true);
    }

    function resumeTalentAssessmentFlow() {
      if (!suspendedTalentAssessment) {
        startTalentAssessmentFlow(currentActivityPayload ? currentActivityPayload.item.title : "成都人才安家专场");
        return;
      }

      activeChatFlow = {
        ...suspendedTalentAssessment,
        answers: { ...suspendedTalentAssessment.answers }
      };
      suspendedTalentAssessment = null;
      chatInput.placeholder = "请按下方资料选项完成初筛，也可以补充说明";
      addChatMessage("bot", "继续刚才的人才评定，请继续选择。");
      promptTalentCheckStep();
    }

    function openTalentActivityFromChat(activityTitle = "上海人才安家成都专场") {
      const matchedGroupIndex = cityActivities.findIndex((group) =>
        group.items.some((item) => item.title === activityTitle)
      );

      if (matchedGroupIndex === -1) {
        addChatMessage("bot", "暂时没有找到对应的人才活动页，请返回首页查看上海专场。");
        return;
      }

      const matchedItemIndex = cityActivities[matchedGroupIndex].items.findIndex((item) => item.title === activityTitle);
      selectedCity = cityActivities[matchedGroupIndex].city;
      renderFilters();
      renderActivities();
      closeChatDrawer();
      openActivityDetail(matchedGroupIndex, matchedItemIndex);
    }

    function handleTalentChoice(stepId, value, label) {
      if (!activeChatFlow || activeChatFlow.type !== "talent-check") {
        return;
      }

      const step = talentCheckSteps[activeChatFlow.stepIndex];
      if (!step || step.id !== stepId) {
        return;
      }

      addChatMessage("user", label);
      activeChatFlow.answers[stepId] = value;
      activeChatFlow.stepIndex += 1;

      if (activeChatFlow.stepIndex < talentCheckSteps.length) {
        promptTalentCheckStep();
        return;
      }

      const conclusion = getTalentCheckConclusion(activeChatFlow.answers);
      addChatMessage("bot", conclusion.message);
      renderQuickQuestions(
        conclusion.qualified ? [
          {
            type: "talent-open-activity",
            label: "进入上海人才活动",
            value: activeChatFlow.activityTitle || "上海人才安家成都专场"
          },
          { type: "talent-policy", label: "政策详情" },
          { type: "talent-apply", label: "人才申请" },
          { type: "talent-restart", label: "重新测评" }
        ] : [
          { type: "talent-policy", label: "政策详情" },
          { type: "talent-apply", label: "人才申请" },
          { type: "talent-restart", label: "重新测评" }
        ],
        true
      );
      suspendedTalentAssessment = null;
      activeChatFlow = null;
      chatInput.placeholder = defaultChatPlaceholder;
    }

    function getBotReply(question) {
      const text = question.trim();
      if (!text) {
        return "可以直接问我成都购房资格、公积金、税费或异地看房流程。";
      }

      if (activeChatFlow && activeChatFlow.type === "talent-check") {
        return "为了判断你是否符合成都人才，请先按下方资料选项完成初筛。";
      }

      if (text.includes("人才政策")) {
        return getTalentPolicyReply();
      }

      if ((text.includes("人才") && text.includes("申请")) || text.includes("智慧人才") || text.includes("我要住在成都")) {
        return getTalentApplyReply();
      }

      if (text.includes("资格") || text.includes("条件") || text.includes("限购")) {
        return "原型示例回答：机器人会先识别你的户籍、社保和家庭名下住房情况，再返回对应区域的购房资格提示，并引导你联系顾问做正式核验。";
      }

      if (text.includes("人才")) {
        return "你可以进入“上海人才安家成都专场”，点击“查看我是否符合成都人才”，机器人会按学历、工作和资料情况一步步帮你做初筛。";
      }

      if (text.includes("公积金")) {
        return "原型示例回答：机器人会根据是否首套、缴存地和缴存时长给出公积金贷款额度区间，同时提示组合贷和商业贷的搭配建议。";
      }

      if (text.includes("税") || text.includes("契税") || text.includes("费用")) {
        return "原型示例回答：专题页会将契税、维修基金、按揭服务费等常见费用拆开展示，让外地客户能先估算总预算，具体仍以签约时政策为准。";
      }

      if (text.includes("装修")) {
        return "原型示例回答：装修专区可按区域、预算和交付时间筛选公司，并支持顾问代为安排量房、远程监工和验收节点提醒。";
      }

      return "原型示例回答：这个机器人入口适合承接成都政策与落地服务问题。实际接入时可连接政策知识库、楼盘库和 CRM 线索系统。";
    }

    function openChatDrawer(prefill, options = {}) {
      chatDrawer.classList.add("is-visible");
      if (typeof prefill === "string") {
        chatInput.value = prefill;
      }
      chatInput.placeholder = options.placeholder || defaultChatPlaceholder;
      if (!activeChatFlow) {
        renderQuickQuestions();
      }
      chatInput.focus();
    }

    function closeChatDrawer() {
      chatDrawer.classList.remove("is-visible");
      resetChatQuickQuestions();
    }

    function applyInitialRoute() {
      const params = new URLSearchParams(window.location.search);
      const screen = params.get("screen");
      const groupIndex = Number(params.get("group"));
      const itemIndex = Number(params.get("item"));
      const districtName = params.get("districtName");
      const chatMode = params.get("chat");

      if (screen !== "activity" || Number.isNaN(groupIndex) || Number.isNaN(itemIndex) || !cityActivities[groupIndex] || !cityActivities[groupIndex].items[itemIndex]) {
        return;
      }

      selectedCity = cityActivities[groupIndex].city;
      renderFilters();
      renderActivities();
      renderActivityDetail(groupIndex, itemIndex);

      if (districtName && currentActivityPayload && currentActivityPayload.districts.some((district) => district.name === districtName)) {
        selectedDistrict = districtName;
        renderDistrictContent();
      }

      showScreen("activity");

      if (chatMode === "talent" && currentActivityPayload && currentActivityPayload.item.talentCheck) {
        startTalentEligibilityCheck(currentActivityPayload.item.title);
      }
    }

    function goBackOrFallback(fallbackAction) {
      if (window.history.length > 1) {
        window.history.back();
        return;
      }

      if (typeof fallbackAction === "function") {
        fallbackAction();
      }
    }

    document.getElementById("backPreviousButton").addEventListener("click", () => goBackOrFallback());
    document.getElementById("backHomeButton").addEventListener("click", () => {
      showScreen("home");
    });
    document.getElementById("backActivityButton").addEventListener("click", () => {
      showScreen("activity");
    });
    document.getElementById("chatFabButton").addEventListener("click", () => openChatDrawer(""));
    document.getElementById("closeChatButton").addEventListener("click", closeChatDrawer);
    cityFilters.addEventListener("click", (event) => {
      const button = event.target.closest("[data-group-index][data-item-index]");
      if (!button) {
        return;
      }
      selectedCity = button.dataset.city;
      renderFilters();
      renderActivities();
      openActivityDetail(Number(button.dataset.groupIndex), Number(button.dataset.itemIndex));
    });

    if (cityActivityList) {
      cityActivityList.addEventListener("click", (event) => {
        const button = event.target.closest("[data-city-activity-switch]");
        if (!button) {
          return;
        }

        renderActivityDetail(Number(button.dataset.groupIndex), Number(button.dataset.itemIndex));
      });
    }

    if (activityList) {
      activityList.addEventListener("click", (event) => {
        const button = event.target.closest("[data-group-index][data-item-index]");
        if (!button) {
          return;
        }
        openActivityDetail(Number(button.dataset.groupIndex), Number(button.dataset.itemIndex));
      });
    }

    activityListingGrid.addEventListener("click", (event) => {
      const button = event.target.closest("[data-open-report]");
      if (!button || !currentActivityPayload) {
        return;
      }
      const estate = currentActivityPayload.estates.find((item) => item.title === button.dataset.openReport);
      if (!estate) {
        return;
      }
      openReportDetail(estate);
    });

    districtFilters.addEventListener("click", (event) => {
      const button = event.target.closest("[data-district]");
      if (!button) {
        return;
      }
      selectedDistrict = button.dataset.district;
      renderDistrictContent();
    });

    if (decorEntryButton && decorDirectory && decorEntryArrow) {
      decorEntryButton.addEventListener("click", () => {
        const willOpen = !decorDirectory.classList.contains("is-open");
        decorDirectory.classList.toggle("is-open", willOpen);
        decorEntryButton.setAttribute("aria-expanded", String(willOpen));
        decorEntryArrow.textContent = willOpen ? "−" : "+";
      });
    }

    activityStatus.addEventListener("click", (event) => {
      if (!activityStatus.hasAttribute("data-open-talent-check")) {
        return;
      }
      startTalentEligibilityCheck(currentActivityPayload ? currentActivityPayload.item.title : "成都人才安家专场");
    });

    activityStatus.addEventListener("keydown", (event) => {
      if (!activityStatus.hasAttribute("data-open-talent-check")) {
        return;
      }
      if (event.key !== "Enter" && event.key !== " ") {
        return;
      }
      event.preventDefault();
      startTalentEligibilityCheck(currentActivityPayload ? currentActivityPayload.item.title : "成都人才安家专场");
    });

    chatQuickList.addEventListener("click", (event) => {
      const button = event.target.closest("[data-chat-action]");
      if (!button) {
        return;
      }

      const action = button.dataset.chatAction;

      if (action === "question") {
        const question = button.dataset.value;
        addChatMessage("user", question);
        addChatMessage("bot", getBotReply(question));
        return;
      }

      if (action === "talent-choice") {
        handleTalentChoice(button.dataset.step, button.dataset.value, button.textContent.trim());
        return;
      }

      if (action === "talent-start") {
        addChatMessage("user", button.textContent.trim());
        startTalentAssessmentFlow(button.dataset.value || (currentActivityPayload ? currentActivityPayload.item.title : "成都人才安家专场"));
        return;
      }

      if (action === "talent-policy") {
        addChatMessage("user", button.textContent.trim());
        openTalentPolicyChooser(button.dataset.value || (currentActivityPayload ? currentActivityPayload.item.title : "成都人才安家专场"));
        return;
      }

      if (action === "talent-policy-district") {
        const resolvedActivityTitle = activeChatFlow && activeChatFlow.activityTitle
          ? activeChatFlow.activityTitle
          : (currentActivityPayload ? currentActivityPayload.item.title : "成都人才安家专场");
        addChatMessage("user", button.textContent.trim());
        addChatMessage("bot", getTalentPolicyDistrictReply(button.dataset.value || ""));
        activeChatFlow = {
          type: "talent-entry",
          activityTitle: resolvedActivityTitle
        };
        chatInput.placeholder = "可先点下方入口，也可以继续补充你的问题";
        renderQuickQuestions(getTalentPolicyResultActions(activeChatFlow.activityTitle), true);
        return;
      }

      if (action === "talent-apply") {
        addChatMessage("user", button.textContent.trim());
        addChatMessage("bot", getTalentApplyReply());
        return;
      }

      if (action === "talent-resume") {
        addChatMessage("user", button.textContent.trim());
        resumeTalentAssessmentFlow();
        return;
      }

      if (action === "talent-open-activity") {
        openTalentActivityFromChat(button.dataset.value || "上海人才安家成都专场");
        return;
      }

      if (action === "talent-restart") {
        startTalentEligibilityCheck(currentActivityPayload ? currentActivityPayload.item.title : "成都人才安家专场");
      }
    });

    document.getElementById("chatForm").addEventListener("submit", (event) => {
      event.preventDefault();
      const question = chatInput.value.trim();
      if (!question) {
        return;
      }
      addChatMessage("user", question);
      if (question.includes("人才政策") || question.includes("政策详情") || (question.includes("政策") && question.includes("区"))) {
        openTalentPolicyChooser(currentActivityPayload ? currentActivityPayload.item.title : "成都人才安家专场");
        chatInput.value = "";
        return;
      }
      addChatMessage("bot", getBotReply(question));
      chatInput.value = "";
    });

    renderFilters();
    renderActivities();
    renderDecorDirectory();
    renderActivityDetail(0, 0);
    renderQuickQuestions();
    addChatMessage("bot", "你好，我是政策机器人。你可以先问我购房资格、公积金、税费，也可以在人才专场里让我帮你做成都人才初筛。");
    applyInitialRoute();
  </script>
</body>
</html>
