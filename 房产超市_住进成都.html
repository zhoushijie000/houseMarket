<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>房产超市 - 住进成都专题原型</title>
  <style>
    :root {
      --brand-primary: #fd5d00;
      --brand-secondary: #ff8f2e;
      --brand-deep: #c74100;
      --accent-green: #67cc35;
      --accent-red: #ff2828;
      --text-primary: #303133;
      --text-secondary: #606266;
      --text-tertiary: #909399;
      --text-quaternary: #c0c4cc;
      --line-soft: #e4e7ed;
      --page-bg: #f3f5f6;
      --surface: #ffffff;
      --surface-soft: #fff7f0;
      --surface-warm: #fff2e5;
      --surface-cool: #eef7f7;
      --shadow-card: 0 14px 32px rgba(48, 49, 51, 0.08);
      --shadow-float: 0 18px 44px rgba(253, 93, 0, 0.18);
      --radius-xs: 6px;
      --radius-sm: 10px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --radius-xl: 28px;
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-7: 28px;
      --space-8: 32px;
      --font-display: "Alibaba PuHuiTi 3.0", "PingFang SC", "Source Han Sans SC", "Microsoft YaHei", sans-serif;
      --font-body: "PingFang SC", "Source Han Sans SC", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(255, 212, 181, 0.9), transparent 36%),
        radial-gradient(circle at right 14%, rgba(255, 181, 132, 0.42), transparent 28%),
        linear-gradient(180deg, #fff9f4 0%, #f7f2ec 100%);
      color: var(--text-primary);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body {
      display: flex;
      justify-content: center;
      padding: 24px 12px;
    }

    button,
    input {
      font: inherit;
    }

    .phone-shell {
      position: relative;
      width: min(100%, 390px);
      min-height: 844px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0.98)),
        var(--page-bg);
      border-radius: 34px;
      box-shadow:
        0 24px 60px rgba(48, 49, 51, 0.12),
        inset 0 0 0 1px rgba(255, 255, 255, 0.75);
      overflow: hidden;
      isolation: isolate;
    }

    .phone-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(140deg, rgba(255, 244, 232, 0.95), transparent 36%),
        radial-gradient(circle at right top, rgba(253, 93, 0, 0.08), transparent 36%);
      pointer-events: none;
      z-index: 0;
    }

    .page-stack,
    .screen {
      position: relative;
      z-index: 1;
      height: 100%;
    }

    .screen {
      display: none;
      height: 844px;
      overflow-y: auto;
      scrollbar-width: none;
      animation: screen-enter 320ms ease;
    }

    .screen::-webkit-scrollbar {
      display: none;
    }

    .screen.is-active {
      display: block;
    }

    .page-content {
      padding: 18px 16px calc(44px + env(safe-area-inset-bottom, 0px));
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 6;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: calc(12px + env(safe-area-inset-top, 0px)) 16px 12px;
      backdrop-filter: blur(18px);
      background: linear-gradient(180deg, rgba(255, 250, 245, 0.92), rgba(255, 250, 245, 0.72));
      border-bottom: 1px solid rgba(228, 231, 237, 0.7);
    }

    .topbar__meta,
    .topbar__action {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .topbar__meta {
      width: 100%;
      min-height: 24px;
    }

    .topbar__city {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(255, 143, 46, 0.14);
      color: var(--brand-deep);
      font-size: 12px;
      font-weight: 600;
    }

    .topbar__title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-align: center;
      white-space: nowrap;
    }

    .icon-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border: none;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 10px 22px rgba(48, 49, 51, 0.08);
      cursor: pointer;
      color: var(--text-primary);
    }

    .back-button {
      position: relative;
      z-index: 1;
      border: none;
      padding: 0;
      background: transparent;
      color: var(--text-primary);
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
    }

    .hero-card {
      position: relative;
      overflow: hidden;
      padding: 12px;
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(255, 247, 239, 0.96));
      box-shadow: var(--shadow-card);
    }

    .hero-card::after {
      display: none;
    }

    .hero-card__cover {
      position: relative;
      min-height: 188px;
      border-radius: 20px;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(10, 18, 28, 0.05), rgba(10, 18, 28, 0.38)),
        url("./assets/d86e2b37c94f42fcb022f0376ae8a0cf.jpg") center / cover no-repeat;
      box-shadow: inset 0 -24px 44px rgba(10, 18, 28, 0.18);
    }

    .hero-card__cover::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(10, 18, 28, 0.22));
      pointer-events: none;
    }

    .hero-card__cover-badge {
      position: absolute;
      left: 14px;
      top: 14px;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      backdrop-filter: blur(8px);
    }

    .hero-card__cover-play {
      position: absolute;
      right: 14px;
      bottom: 14px;
      z-index: 1;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.22);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      backdrop-filter: blur(10px);
    }

    .hero-card__eyebrow {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.68);
      color: var(--brand-deep);
      font-size: 12px;
      font-weight: 700;
    }

    .hero-card__title {
      position: relative;
      flex: 1 1 auto;
      margin: 0;
      font-family: var(--font-display);
      font-size: 18px;
      line-height: 1.35;
      font-weight: 700;
    }

    .hero-card__desc {
      position: relative;
      margin: 0;
      color: var(--text-secondary);
      line-height: 1.6;
      font-size: 12px;
    }

    .hero-card__tool-row {
      position: relative;
      z-index: 1;
      display: flex;
      flex: 0 0 auto;
      align-items: flex-start;
      justify-content: flex-end;
    }

    .hero-card__locate {
      min-height: 24px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: none;
      white-space: nowrap;
      font-size: 12px;
      line-height: 1;
    }

    .hero-card__heading {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-top: 12px;
    }

    .hero-card__status {
      position: relative;
      z-index: 1;
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 16px;
      background: var(--surface-soft);
      color: var(--text-secondary);
      font-size: 12px;
      line-height: 1.5;
    }

    .hero-card__status strong {
      color: var(--brand-deep);
    }

    .section {
      margin-top: 16px;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .section-head h2 {
      margin: 0;
      font-family: var(--font-display);
      font-size: 17px;
      font-weight: 700;
    }

    .section-head p {
      margin: 4px 0 0;
      font-size: 12px;
      color: var(--text-tertiary);
    }

    .section-link {
      border: none;
      background: transparent;
      color: var(--brand-primary);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .shortcut-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .shortcut-card {
      padding: 14px 8px 12px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: var(--shadow-card);
      text-align: center;
    }

    .shortcut-card__icon {
      width: 42px;
      height: 42px;
      margin: 0 auto 10px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-size: 18px;
      background: linear-gradient(180deg, rgba(255, 143, 46, 0.16), rgba(253, 93, 0, 0.08));
    }

    .shortcut-card strong {
      display: block;
      font-size: 14px;
      font-weight: 700;
    }

    .shortcut-card span {
      display: block;
      margin-top: 4px;
      color: var(--text-tertiary);
      font-size: 11px;
      line-height: 1.4;
    }

    .topic-banner {
      position: relative;
      overflow: hidden;
      padding: 18px;
      border: none;
      width: 100%;
      border-radius: 24px;
      background:
        radial-gradient(circle at top right, rgba(255, 255, 255, 0.24), transparent 26%),
        linear-gradient(135deg, #d9571d 0%, #fd7e22 42%, #ffb65f 100%);
      color: #fff;
      text-align: left;
      box-shadow: var(--shadow-float);
      cursor: pointer;
    }

    .topic-banner__tag {
      display: inline-flex;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .topic-banner__title {
      margin: 14px 0 8px;
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 700;
    }

    .topic-banner__desc {
      margin: 0;
      max-width: 250px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.88);
      font-size: 13px;
    }

    .topic-banner__cta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 18px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
    }

    .listing-grid {
      display: grid;
      gap: 12px;
    }

    .listing-card {
      display: grid;
      grid-template-columns: 88px 1fr;
      align-items: start;
      gap: 12px;
      padding: 12px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: var(--shadow-card);
    }

    .listing-card__media {
      width: 100%;
      aspect-ratio: 5 / 4;
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(253, 93, 0, 0.12), rgba(255, 143, 46, 0.08)),
        #fff1e6;
      min-height: auto;
      display: grid;
      place-items: end start;
      align-self: start;
      padding: 9px;
      color: var(--brand-deep);
      font-size: 11px;
      font-weight: 700;
    }

    .listing-card__title {
      margin: 0 0 4px;
      font-size: 15px;
      font-weight: 700;
    }

    .listing-card__meta,
    .listing-card__tagline {
      margin: 0;
      color: var(--text-secondary);
      font-size: 12px;
      line-height: 1.55;
    }

    .listing-card__price {
      margin-top: 8px;
      color: var(--brand-primary);
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
    }

    .listing-card__price span,
    .listing-card__price small {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-tertiary);
    }

    .listing-card__video {
      margin-top: 8px;
      padding: 10px 12px;
      border-radius: 16px;
      background: rgba(49, 93, 117, 0.08);
    }

    .listing-card__video-tag {
      display: inline-flex;
      padding: 5px 9px;
      border-radius: 999px;
      background: rgba(49, 93, 117, 0.12);
      color: #315d75;
      font-size: 11px;
      font-weight: 700;
    }

    .listing-card__video-title {
      margin: 8px 0 4px;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.5;
    }

    .listing-card__video-meta {
      margin: 0;
      color: var(--text-secondary);
      font-size: 11px;
      line-height: 1.6;
    }

    .listing-card__report {
      width: 100%;
      margin-top: 8px;
      padding: 10px 12px;
      border: none;
      border-radius: 16px;
      background: rgba(253, 93, 0, 0.08);
      text-align: left;
      cursor: pointer;
    }

    .listing-card__report-tag {
      display: inline-flex;
      padding: 5px 9px;
      border-radius: 999px;
      background: rgba(253, 93, 0, 0.12);
      color: var(--brand-deep);
      font-size: 11px;
      font-weight: 700;
    }

    .listing-card__report-title {
      margin: 8px 0 4px;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.5;
      color: var(--text-primary);
    }

    .listing-card__report-meta {
      margin: 0;
      color: var(--text-secondary);
      font-size: 11px;
      line-height: 1.6;
    }

    .detail-hero {
      padding: 20px;
      border-radius: var(--radius-xl);
      background:
        radial-gradient(circle at right top, rgba(255, 255, 255, 0.2), transparent 30%),
        linear-gradient(135deg, #243949 0%, #315d75 48%, #4c7b78 100%);
      color: #fff;
      box-shadow: var(--shadow-card);
    }

    .detail-hero__eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      font-size: 12px;
      font-weight: 700;
    }

    .detail-hero h1 {
      margin: 16px 0 8px;
      font-family: var(--font-display);
      font-size: 30px;
      line-height: 1.15;
    }

    .detail-hero p {
      margin: 0;
      color: rgba(255, 255, 255, 0.84);
      font-size: 14px;
      line-height: 1.7;
    }

    .detail-hero__badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 18px;
    }

    .detail-hero__badge {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      font-size: 12px;
    }

    .toolbar-card,
    .panel-card {
      padding: 16px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: var(--shadow-card);
    }

    .toolbar-card {
      margin-top: 18px;
    }

    .toolbar-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
    }

    .toolbar-row p {
      margin: 6px 0 0;
      color: var(--text-tertiary);
      font-size: 12px;
      line-height: 1.5;
    }

    .primary-button,
    .ghost-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease;
    }

    .primary-button {
      background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
      color: #fff;
      box-shadow: 0 14px 26px rgba(253, 93, 0, 0.24);
    }

    .ghost-button {
      background: rgba(255, 143, 46, 0.12);
      color: var(--brand-deep);
    }

    .primary-button:active,
    .ghost-button:active,
    .icon-button:active {
      transform: translateY(1px);
    }

    .filter-chips {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
    }

    .filter-chips::-webkit-scrollbar {
      display: none;
    }

    .chip {
      flex: 0 0 auto;
      padding: 10px 14px;
      border-radius: 999px;
      border: none;
      background: #f5f7fa;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 160ms ease, color 160ms ease, transform 160ms ease;
    }

    .chip.is-active {
      background: rgba(255, 143, 46, 0.18);
      color: var(--brand-deep);
      box-shadow: inset 0 0 0 1px rgba(253, 93, 0, 0.18);
    }

    .chip.is-match {
      outline: 2px solid rgba(103, 204, 53, 0.28);
      outline-offset: 1px;
    }

    .city-card-grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 14px;
    }

    .city-card {
      position: relative;
      display: grid;
      align-content: start;
      gap: 4px;
      min-height: 92px;
      padding: 12px 10px;
      border: none;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: inset 0 0 0 1px rgba(228, 231, 237, 0.9);
      text-align: left;
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .city-card:active {
      transform: translateY(1px);
    }

    .city-card.is-active {
      background: linear-gradient(180deg, rgba(255, 244, 236, 0.98), rgba(255, 236, 219, 0.96));
      box-shadow:
        inset 0 0 0 1px rgba(253, 93, 0, 0.18),
        0 12px 24px rgba(253, 93, 0, 0.1);
    }

    .city-card.is-active .city-card__name,
    .city-card.is-active .city-card__theme {
      color: var(--brand-deep);
    }

    .city-card.is-active .city-card__meta {
      color: rgba(82, 60, 42, 0.86);
    }

    .city-card.is-match::after {
      content: "定位";
      position: absolute;
      top: 10px;
      right: 3px;
      padding: 3px 7px;
      border-radius: 999px;
      background: rgba(103, 204, 53, 0.14);
      color: #4f8c27;
      font-size: 12px;
      font-weight: 700;
    }

    .city-card__name {
      display: block;
      padding-right: 28px;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.2;
      color: var(--text-primary);
    }

    .city-card__theme {
      display: block;
      color: var(--brand-deep);
      font-size: 11px;
      font-weight: 600;
      line-height: 1.4;
    }

    .city-card__meta {
      display: block;
      margin-top: 8px;
      color: var(--text-tertiary);
      font-size: 10px;
      line-height: 1.4;
    }

    .activity-list {
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }

    .activity-group {
      padding: 16px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: var(--shadow-card);
    }

    .activity-group__head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .activity-group__title {
      margin: 0;
      font-size: 17px;
      font-weight: 700;
    }

    .activity-group__desc {
      margin: 6px 0 0;
      color: var(--text-tertiary);
      font-size: 12px;
      line-height: 1.5;
    }

    .activity-group__badge {
      flex: 0 0 auto;
      padding: 8px 10px;
      border-radius: 14px;
      background: rgba(255, 143, 46, 0.12);
      color: var(--brand-deep);
      font-size: 12px;
      font-weight: 700;
    }

    .activity-item {
      padding: 14px;
      border-radius: 18px;
      background: var(--surface-soft);
      border: 1px solid rgba(253, 93, 0, 0.08);
      transition: transform 160ms ease, box-shadow 160ms ease;
    }

    .activity-item + .activity-item {
      margin-top: 10px;
    }

    .activity-item:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 22px rgba(253, 93, 0, 0.08);
    }

    .activity-item__main {
      width: 100%;
      padding: 0;
      border: none;
      background: transparent;
      text-align: left;
      cursor: pointer;
    }

    .activity-item__title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .activity-item__title strong {
      font-size: 14px;
    }

    .activity-item__count {
      color: var(--brand-primary);
      font-size: 13px;
      font-weight: 700;
    }

    .activity-item__meta {
      margin: 0;
      color: var(--text-secondary);
      font-size: 12px;
      line-height: 1.75;
    }

    .activity-item__footer {
      display: flex;

    function bindReportGallery() {
      const gallery = reportPage.querySelector("[data-report-gallery]");
      if (!gallery) {
        return;
      }

      const slides = Array.from(gallery.querySelectorAll(".report-photo"));
      const dots = Array.from(reportPage.querySelectorAll("[data-report-gallery-dot]"));

      if (!slides.length) {
        return;
      }

      const getStep = () => {
        const styles = window.getComputedStyle(gallery);
        const gap = parseFloat(styles.columnGap || styles.gap || 0);
        return (slides[0].offsetWidth || gallery.clientWidth || 1) + gap;
      };

      const updateState = () => {
        const index = Math.max(0, Math.min(slides.length - 1, Math.round(gallery.scrollLeft / getStep())));

        dots.forEach((dot, dotIndex) => {
          dot.classList.toggle("is-active", dotIndex === index);
        });
      };

      gallery.addEventListener("scroll", updateState, { passive: true });

      dots.forEach((dot) => {
        dot.addEventListener("click", () => {
          const index = Number(dot.dataset.reportGalleryDot);
          gallery.scrollTo({
            left: getStep() * index,
            behavior: "smooth"
          });
        });
      });

      window.requestAnimationFrame(updateState);
    }

    function getTalentCheckConclusion(answers) {
      const hasStrongEducation = answers.education === "high";
      const hasEducationBase = hasStrongEducation || answers.education === "mid";
      const hasJobBase = answers.employment === "social" || answers.employment === "offer";
      const hasStrongJobBase = answers.employment === "social";
      const materialsFull = answers.materials === "full";
      const materialsPartial = answers.materials === "partial";

      if (hasStrongEducation && hasJobBase && materialsFull) {
        return {
          qualified: true,
          message: "初步结论：你符合成都人才条件。"
        };
      }

      if (hasEducationBase && hasJobBase && (materialsFull || materialsPartial)) {
        return {
          qualified: false,
          message: "初步结论：你有较大概率按成都人才口径申请。"
        };
      }

      if (hasEducationBase && !hasJobBase) {
        return {
          qualified: false,
          message: "初步结论：你目前更像具备人才基础，但缺少成都工作或社保资料，暂不能直接判断为符合。\n建议下一步：补充成都单位 offer、劳动合同或社保证明后再测。"
        };
      }

      if (!hasEducationBase && hasStrongJobBase && materialsFull) {
        return {
          qualified: false,
          message: "初步结论：按当前政策口径，人才证明基础还不够强，建议先补充学历或职称材料后再核验。"
        };
      }

      return {
        qualified: false,
        message: "初步结论：按当前口径，你暂不符合成都人才初筛条件。"
      };
    }

    function toRadians(value) {
      return value * Math.PI / 180;
    }

    function getDistance(lat1, lon1, lat2, lon2) {
      const earthRadius = 6371;
      const deltaLat = toRadians(lat2 - lat1);
      const deltaLon = toRadians(lon2 - lon1);
      const a =
        Math.sin(deltaLat / 2) * Math.sin(deltaLat / 2) +
        Math.cos(toRadians(lat1)) * Math.cos(toRadians(lat2)) *
        Math.sin(deltaLon / 2) * Math.sin(deltaLon / 2);
      return 2 * earthRadius * Math.asin(Math.sqrt(a));
    }

    function locateNearestCity() {
      if (!navigator.geolocation) {
        locationStatus.innerHTML = "当前浏览器不支持定位，请手动切换城市查看活动。";
        return;
      }

      locationStatus.innerHTML = "正在获取定位并匹配最近活动城市...";
      navigator.geolocation.getCurrentPosition(
        (position) => {
          const { latitude, longitude } = position.coords;
          const nearest = cityActivities
            .map((item) => ({
              city: item.city,
              distance: getDistance(latitude, longitude, item.coords[0], item.coords[1])
            }))
            .sort((a, b) => a.distance - b.distance)[0];

          matchedCity = nearest.city;
          selectedCity = nearest.city;
          renderFilters();
          renderActivities();
          locationStatus.innerHTML = `已根据定位为你匹配最近城市：<strong>${nearest.city}</strong>，距离约 ${nearest.distance.toFixed(0)} km。`;
        },
        () => {
          locationStatus.innerHTML = "定位失败或权限被拒绝，请手动选择城市查看活动。";
        },
        { enableHighAccuracy: true, timeout: 6000 }
      );
    }

    cityFilters.addEventListener("click", (event) => {
      const button = event.target.closest("[data-city]");
      if (!button) {
        return;
      }
      selectedCity = button.dataset.city;
      renderFilters();
      renderActivities();
      formatLocationStatus();
    });

    activityList.addEventListener("click", (event) => {
      const talentButton = event.target.closest("[data-open-list-talent-check]");
      if (talentButton) {
        startTalentEligibilityCheck(talentButton.dataset.activityTitle || "成都人才安家专场");
        return;
      }

      const button = event.target.closest("[data-group-index][data-item-index]");
      if (!button) {
        return;
      }
      openActivityDetail(Number(button.dataset.groupIndex), Number(button.dataset.itemIndex));
    });

    activityListingGrid.addEventListener("click", (event) => {
      const button = event.target.closest("[data-open-report]");
      if (!button || !currentActivityPayload) {
        return;
      }
      const estate = currentActivityPayload.estates.find((item) => item.title === button.dataset.openReport);
      if (!estate) {
        return;
      }
      openReportDetail(estate);
    });

    districtFilters.addEventListener("click", (event) => {
      const button = event.target.closest("[data-district]");
      if (!button) {
        return;
      }
      selectedDistrict = button.dataset.district;
      renderDistrictContent();
    });

    decorEntryButton.addEventListener("click", () => {
      const willOpen = !decorDirectory.classList.contains("is-open");
      decorDirectory.classList.toggle("is-open", willOpen);
      decorEntryButton.setAttribute("aria-expanded", String(willOpen));
      decorEntryArrow.textContent = willOpen ? "−" : "+";
    });

    activityStatus.addEventListener("click", (event) => {
      if (!activityStatus.hasAttribute("data-open-talent-check")) {
        return;
      }
      startTalentEligibilityCheck(currentActivityPayload ? currentActivityPayload.item.title : "成都人才安家专场");
    });

    activityStatus.addEventListener("keydown", (event) => {
      if (!activityStatus.hasAttribute("data-open-talent-check")) {
        return;
      }
      if (event.key !== "Enter" && event.key !== " ") {
        return;
      }
      event.preventDefault();
      startTalentEligibilityCheck(currentActivityPayload ? currentActivityPayload.item.title : "成都人才安家专场");
    });

    chatQuickList.addEventListener("click", (event) => {
      const button = event.target.closest("[data-chat-action]");
      if (!button) {
        return;
      }

      const action = button.dataset.chatAction;

      if (action === "question") {
        const question = button.dataset.value;
        addChatMessage("user", question);
        addChatMessage("bot", getBotReply(question));
        return;
      }

      if (action === "talent-choice") {
        handleTalentChoice(button.dataset.step, button.dataset.value, button.textContent.trim());
        return;
      }

      if (action === "talent-open-activity") {
        openTalentActivityFromChat(button.dataset.value || "上海人才安家成都专场");
        return;
      }

      if (action === "talent-restart") {
        startTalentEligibilityCheck(currentActivityPayload ? currentActivityPayload.item.title : "成都人才安家专场");
      }
    });

    document.getElementById("chatForm").addEventListener("submit", (event) => {
      event.preventDefault();
      const question = chatInput.value.trim();
      if (!question) {
        return;
      }
      addChatMessage("user", question);
      addChatMessage("bot", getBotReply(question));
      chatInput.value = "";
    });

    renderFilters();
    renderActivities();
    renderDecorDirectory();
    renderActivityDetail(0, 0);
    renderQuickQuestions();
    formatLocationStatus();
    addChatMessage("bot", "你好，我是成都政策机器人。你可以先问我购房资格、公积金、税费，也可以在人才专场里让我帮你做成都人才初筛。");
  </script>
</body>
</html>
